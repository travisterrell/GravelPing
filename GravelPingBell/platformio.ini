[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32.git#main
board = esp32-c6-devkitm-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
upload_port = COM8

;--------------------------------------------------------------------------
; For OTA upload via WiFi, uncomment these lines & update the IP address.
; (Ensure ENABLE_OTA_UPDATES build_flag is enabled.)
; upload_protocol = espota
; upload_port = GravelPingBell.local
; upload_flags =
;     --port=3232
;     --auth=gravelping
;--------------------------------------------------------------------------

lib_deps =
    fastled/FastLED
    knolleary/PubSubClient
    bblanchon/ArduinoJson

build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

    ; WiFi Configuration
    -D WIFI_SSID=wifiSSID
    -D WIFI_PASSWORD=wifiPassword

    ; MQTT Configuration
    -D MQTT_BROKER=192.168.1.175
    -D MQTT_PORT=1883
    -D MQTT_USER=mqttUser
    -D MQTT_PASSWORD=mqttPassword

    ; Device Configuration
    -D DEVICE_NAME=GravelPingBell

    ; OTA Configuration
    -D ENABLE_OTA_UPDATES=0
    -D OTA_HOSTNAME=GravelPingBell
    -D OTA_PASSWORD=gravelping

    ; Bell Configuration
    -D BELL_PIN=3                   ; GPIO pin driving the MOSFET gate
    -D RING_SINGLE_MS=1100          ; Duration of a single ring (ms)
    -D RING_PATTERN_COUNT=3         ; Number of short rings in pattern
    -D RING_PATTERN_ON_MS=400       ; On duration per pattern pulse (ms)
    -D RING_PATTERN_OFF_MS=300      ; Off gap between pattern pulses (ms)